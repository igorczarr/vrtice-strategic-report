<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-THWRY46SCN"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRTICE | Command Deck</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="assets/css/links.css">
    <link rel="icon" href="./assets/img/Favicon.png" type="image/x-icon">
</head>
<body>

    <div class="orbital-bg"></div>

    <main class="linkpage-wrapper">
        <header class="links-header">
            <div class="logo-v-container">
                <img src="./assets/img/Branco-20.png" alt="VRTICE Logo" class="links-logo">
            </div>
            <p class="links-tagline">ENGENHARIA & INTELIGÊNCIA DE ESCALA</p>
        </header>

        <nav class="links-container">
            <a href="index.html" class="link-card">
                <div class="card-glow"></div>
                <div class="card-content">
                    <i class="ph ph-browser"></i>
                    <span>LANDING PAGE</span>
                    <i class="ph ph-arrow-up-right arrow-diag"></i>
                </div>
            </a>

            <a href="#consultoria" class="link-card highlight">
                <div class="card-glow"></div>
                <div class="card-content">
                    <i class="ph ph-strategy"></i>
                    <span>CONSULTORIA</span>
                    <i class="ph ph-arrow-up-right arrow-diag"></i>
                </div>
            </a>

            <a href="#portfolio" class="link-card">
                <div class="card-glow"></div>
                <div class="card-content">
                    <i class="ph ph-code-block"></i>
                    <span>PORTFÓLIO</span>
                    <i class="ph ph-arrow-up-right arrow-diag"></i>
                </div>
            </a>

            <a href="#contato" class="link-card">
                <div class="card-glow"></div>
                <div class="card-content">
                    <i class="ph ph-envelope-simple"></i>
                    <span>CONTATO</span>
                    <i class="ph ph-arrow-up-right arrow-diag"></i>
                </div>
            </a>
        </nav>

        <footer class="links-footer">
            <div class="system-status">
                <span class="status-dot"></span>
                <span class="status-text">SYSTEM ENCRYPTED: VRTICE_CORE</span>
            </div>
        </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="assets/js/links.js"></script>
</body>
</html>
